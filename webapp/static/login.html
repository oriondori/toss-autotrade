<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TossAutoTrade — 로그인</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #0d1117;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e6edf3;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 14px;
    padding: 40px 36px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo-icon {
    font-size: 40px;
    line-height: 1;
    margin-bottom: 10px;
  }
  .logo-title {
    font-size: 18px;
    font-weight: 700;
    color: #e6edf3;
  }
  .logo-sub {
    font-size: 12px;
    color: #7d8590;
    margin-top: 4px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #7d8590;
    margin-bottom: 6px;
    margin-top: 18px;
  }
  input[type="password"] {
    width: 100%;
    padding: 10px 14px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e6edf3;
    font-size: 15px;
    outline: none;
    transition: border-color .15s;
  }
  input[type="password"]:focus { border-color: #388bfd; }
  button {
    width: 100%;
    margin-top: 22px;
    padding: 11px;
    background: #238636;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  button:hover { background: #2ea043; }
  .error {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 8px;
    color: #f85149;
    font-size: 13px;
    text-align: center;
    display: none;
  }
  .footer {
    margin-top: 24px;
    text-align: center;
    font-size: 11px;
    color: #7d8590;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📈</div>
    <div class="logo-title">TossAutoTrade</div>
    <div class="logo-sub">자동매매 대시보드</div>
  </div>
  <form id="loginForm" onsubmit="doLogin(event)">
    <label>비밀번호</label>
    <input type="password" id="pw" placeholder="비밀번호 입력" autofocus autocomplete="current-password">
    <button type="submit">로그인</button>
    <div class="error" id="err">비밀번호가 올바르지 않습니다.</div>
  </form>
  <div class="footer">Toss Securities Open API · 실계좌 자동매매</div>
</div>
<script>
async function doLogin(e) {
  e.preventDefault();
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  err.style.display = 'none';
  try {
    const r = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw})
    });
    if (r.ok) {
      const next = new URLSearchParams(location.search).get('next') || '/';
      location.href = next;
    } else {
      err.style.display = 'block';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  } catch {
    err.style.display = 'block';
  }
}
</script>
</body>
</html>
